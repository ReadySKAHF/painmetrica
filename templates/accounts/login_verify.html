{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтверждение входа — Painmetrica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-500: #2E67F6;
    --blue-400: #2E7CF6;
    --gray-950: #262626;
    --gray-550: #919191;
    --gray-300: #EAEAEA;
    --gray-250: #F5F5F5;
    --gray-200: #F9F9F9;
    --white:    #FEFEFE;
    --red-400:  #E43D3D;
    --red-bg:   #FFEBEB;
    --font: 'Nunito Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--white);
    color: var(--gray-950);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 52px;
    max-width: 1320px;
    width: 100%;
    margin: 0 auto;
  }

  .logo {
    font-size: 24px;
    font-weight: 700;
    color: var(--blue-500);
    text-decoration: none;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .content {
    display: flex;
    flex-direction: column;
    gap: 52px;
    width: 425px;
  }

  .page-title {
    font-size: 30px;
    font-weight: 700;
    color: var(--gray-950);
    line-height: 1;
  }

  .verify-text {
    font-size: 18px;
    font-weight: 400;
    color: var(--gray-950);
    line-height: 1.55;
    margin-bottom: 24px;
  }
  .verify-text strong { font-weight: 700; }

  .otp-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 42px;
  }

  .otp-input {
    width: 57px;
    height: 52px;
    border: 1px solid var(--gray-300);
    border-radius: 7px;
    background: var(--white);
    text-align: center;
    font-family: var(--font);
    font-size: 20px;
    font-weight: 700;
    color: var(--gray-950);
    outline: none;
    transition: border .15s;
  }
  .otp-input:focus  { border-color: var(--blue-400); }
  .otp-input.filled { border-color: var(--gray-950); }
  .otp-input.error  { border-color: var(--red-400); color: var(--red-400); }

  .btns-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
  }

  .btn-primary {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 46px;
    padding: 0 24px;
    background: var(--blue-500);
    border: none;
    border-radius: 13px;
    font-family: var(--font);
    font-size: 18px;
    font-weight: 600;
    color: var(--gray-250);
    cursor: pointer;
    transition: opacity .15s;
    width: 98px;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled {
    background: var(--gray-300);
    color: var(--gray-550);
    cursor: not-allowed;
    opacity: 1;
  }

  .btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 46px;
    padding: 0 24px;
    background: var(--white);
    border: 1px solid var(--gray-950);
    border-radius: 13px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-950);
    cursor: pointer;
    transition: background .15s;
    max-width: 324px;
    width: 100%;
  }
  .btn-secondary:hover { background: var(--gray-250); }
  .btn-secondary.muted {
    border-color: var(--gray-550);
    color: var(--gray-550);
  }
  .btn-secondary:disabled {
    border-color: var(--gray-550);
    color: var(--gray-550);
    cursor: not-allowed;
  }

  .error-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 13px 14px;
    background: var(--red-bg);
    border: 1px solid var(--red-400);
    border-radius: 8px;
    margin-top: 26px;
  }
  .error-banner.visible { display: flex; }

  .error-banner-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    color: var(--red-400);
  }

  .error-banner-text {
    flex: 1;
    font-size: 12px;
    color: var(--red-400);
    line-height: 1.4;
  }

  .error-banner-close {
    width: 20px;
    height: 20px;
    background: var(--white);
    border-radius: 12px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
  }
  .error-banner-close:hover { background: var(--gray-250); }

  footer {
    text-align: center;
    padding: 16px;
    font-size: 10px;
    color: var(--gray-950);
  }

  @media (max-width: 600px) {
    header { padding: 20px; }
    .content { width: 100%; padding: 0 20px; }
  }
</style>
</head>
<body>

<header>
  <a href="{% url 'core:home' %}" class="logo">Painmetrica</a>
</header>

<main>
  <div class="content">
    <h1 class="page-title">Вход в аккаунт</h1>

    <div>
      <p class="verify-text">
        На почту <strong>{{ user.email }}</strong> был отправлен код подтверждения.
      </p>

      <form method="post" id="otp-form">
        {% csrf_token %}

        <div class="otp-row">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp1" autocomplete="off">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp2" autocomplete="off">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp3" autocomplete="off">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp4" autocomplete="off">
        </div>

        <input type="hidden" name="otp_code" id="otp_code_hidden">

        <div class="btns-col">
          <button type="submit" class="btn-primary" id="btn-verify" disabled>Войти</button>
          <button type="button" class="btn-secondary muted" id="btn-resend" disabled>
            <span id="resend-label">Получить новый код через <span id="timer-val">01:00</span></span>
          </button>
        </div>

        <div class="error-banner" id="error-banner">
          <svg class="error-banner-icon" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="8.5" stroke="#E43D3D"/>
            <path d="M9 5v4M9 13h.01" stroke="#E43D3D" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="error-banner-text" id="error-text">Введён неверный код!</span>
          <button type="button" class="error-banner-close" id="btn-close-error">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1 1L9 9M9 1L1 9" stroke="#262626" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

      </form>
    </div>

  </div>
</main>

<footer>© 2026 Painmetrica. All rights reserved</footer>

<script>
// Elements
const otpInputs = Array.from(document.querySelectorAll('.otp-input'));
const btnVerify = document.getElementById('btn-verify');
const btnResend = document.getElementById('btn-resend');
const resendLabel = document.getElementById('resend-label');
const errBanner = document.getElementById('error-banner');
const errText = document.getElementById('error-text');
const otpCodeHidden = document.getElementById('otp_code_hidden');

// Show Django errors
{% if messages %}
  {% for message in messages %}
    {% if message.tags == 'error' %}
      errText.textContent = '{{ message }}';
      errBanner.classList.add('visible');
    {% endif %}
  {% endfor %}
{% endif %}

// OTP inputs handling
otpInputs.forEach((inp, idx) => {
  // Input event - only digits
  inp.addEventListener('input', (e) => {
    inp.value = inp.value.replace(/\D/g, '');
    inp.classList.toggle('filled', inp.value !== '');
    inp.classList.remove('error');

    // Auto-focus next field
    if (inp.value && idx < 3) {
      otpInputs[idx + 1].focus();
    }

    checkOTP();
  });

  // Backspace handling
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !inp.value && idx > 0) {
      otpInputs[idx - 1].focus();
      otpInputs[idx - 1].value = '';
      otpInputs[idx - 1].classList.remove('filled', 'error');
      checkOTP();
    }
  });

  // Paste handling
  inp.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');

    otpInputs.forEach((o, i) => {
      o.value = text[i] || '';
      o.classList.toggle('filled', o.value !== '');
      o.classList.remove('error');
    });

    checkOTP();
    const focusIdx = Math.min(text.length, 3);
    otpInputs[focusIdx].focus();
  });
});

// Check if all OTP fields are filled
function checkOTP() {
  const allFilled = otpInputs.every(o => o.value !== '');
  btnVerify.disabled = !allFilled;
  errBanner.classList.remove('visible');

  if (allFilled) {
    otpCodeHidden.value = otpInputs.map(o => o.value).join('');
  } else {
    otpCodeHidden.value = '';
  }
}

// Close error banner
document.getElementById('btn-close-error').addEventListener('click', () => {
  errBanner.classList.remove('visible');
  otpInputs.forEach(o => o.classList.remove('error'));
});

// Timer logic
let timerInterval;

function startTimer(seconds) {
  let left = seconds;
  btnResend.disabled = true;
  btnResend.classList.add('muted');

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    left--;
    const m = String(Math.floor(left / 60)).padStart(2, '0');
    const s = String(left % 60).padStart(2, '0');
    const timerEl = document.getElementById('timer-val');
    if (timerEl) {
      timerEl.textContent = m + ':' + s;
    }

    if (left <= 0) {
      clearInterval(timerInterval);
      btnResend.disabled = false;
      btnResend.classList.remove('muted');
      resendLabel.innerHTML = 'Получить новый код';
    }
  }, 1000);
}

// Resend OTP button
btnResend.addEventListener('click', () => {
  fetch("{% url 'accounts:resend_otp' %}", {
    method: 'POST',
    headers: {
      'X-CSRFToken': '{{ csrf_token }}'
    }
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      // Clear inputs
      otpInputs.forEach(o => {
        o.value = '';
        o.classList.remove('filled', 'error');
      });
      btnVerify.disabled = true;
      otpCodeHidden.value = '';
      errBanner.classList.remove('visible');

      // Reset timer
      resendLabel.innerHTML = 'Получить новый код через <span id="timer-val">01:00</span>';
      startTimer(60);

      // Focus first input
      otpInputs[0].focus();
    } else {
      errText.textContent = data.message || 'Ошибка при отправке кода';
      errBanner.classList.add('visible');
    }
  })
  .catch(err => {
    errText.textContent = 'Ошибка соединения с сервером';
    errBanner.classList.add('visible');
  });
});

// Start timer on page load (5 minutes)
startTimer(300);

// Auto-focus first input
otpInputs[0].focus();
</script>
</body>
</html>
