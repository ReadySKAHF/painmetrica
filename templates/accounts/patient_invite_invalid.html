{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ссылка недействительна — Painmetrica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-500: #2E67F6;
    --gray-950: #262626;
    --gray-550: #919191;
    --gray-300: #EAEAEA;
    --gray-200: #F9F9F9;
    --white: #FEFEFE;
    --font: 'Nunito Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--gray-200);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--gray-950);
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 56px 48px;
    max-width: 520px;
    width: calc(100% - 32px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.07);
  }

  .icon-wrap {
    width: 84px;
    height: 84px;
    background: #FFF0F0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    color: var(--gray-950);
    line-height: 1.35;
  }

  .card-desc {
    font-size: 15px;
    font-weight: 400;
    color: var(--gray-550);
    text-align: center;
    line-height: 1.6;
    max-width: 360px;
  }

  .logo {
    margin-top: 8px;
  }

  @media (max-width: 560px) {
    .card { padding: 40px 24px; }
    .card-title { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <path d="M20 8L20 22" stroke="#E43D3D" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="30" r="2" fill="#E43D3D"/>
      <circle cx="20" cy="20" r="17" stroke="#E43D3D" stroke-width="2.5"/>
    </svg>
  </div>

  <p class="card-title">Ссылка недействительна или<br>срок её действия истёк</p>

  <p class="card-desc">
    Ссылка для регистрации, по которой вы перешли, либо уже была использована,
    либо устарела (ссылки действительны 7 дней).
    Пожалуйста, обратитесь к вашему врачу для получения новой ссылки.
  </p>

  </div>
</div>
